<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>
    <link rel="shortcut icon" href="./assets/payoo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#F4F5F7]  h-[100vh] flex flex-col justify-center items-center">
    <div class="bg-[url(./assets/bg.png)] h-[140px] w-[300px] bg-no-repeat bg-cover flex justify-center items-center px-2">
        <img src="./assets/Group.png" alt="">
    </div>
    <form class="bg-white p-8 w-[350px] mx-auto rounded-3xl">
        <div>
            <label class="text-[#080808] font-medium" for="">Mobile Number</label>
            <br>
            <input id="mobileNumber" type="text" placeholder="Enter Your Number (12345678910)" class="input bg-[F4F5F7] mt-3 w-full rounded-3xl" />
        </div>
        <div class="mt-5">
            <label class="text-[#080808] font-medium" for="">4 Digit Pin</label>
            <br>
            <input id="pinNumber" type="text" placeholder="Enter 4 Digit Pin (1234)" class="input bg-[F4F5F7] mt-3 w-full rounded-3xl" />
        </div>
        <button id="loginBtn" class="btn bg-[#0874F2] font-semibold text-xl text-white mt-5 w-full rounded-3xl">Login</button>
    </form>
    <script src="./login.js"></script>
</body>

</html>
